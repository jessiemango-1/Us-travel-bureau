<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>US Travel Bureau - Ask Anything</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>💬 US Travel Bureau</header>

<div class="container">

<!-- Ask Question -->
<div class="card">
<h2>Ask a Question</h2>
<input id="questionInput" placeholder="Type your question here">
<button onclick="askQuestion()">Submit</button>
</div>

<!-- Admin Login -->
<div class="card">
<h2>Admin Login</h2>
<input id="adminPassword" type="password" placeholder="Admin password">
<button onclick="loginAdmin()">Login as Admin</button>
<p id="adminStatus"></p>
</div>

<!-- Public Questions -->
<div class="card">
<h2>Questions</h2>
<div id="questions"></div>
</div>

<!-- Navigation -->
<div class="card">
<a href="about.html"><button>About the US Travel Bureau</button></a>
</div>

</div>

<script>
// Questions storage
let questions = JSON.parse(localStorage.getItem("questions")) || [];

// Save
function save() { localStorage.setItem("questions", JSON.stringify(questions)); }

// Ask
function askQuestion() {
    let q = document.getElementById("questionInput").value.trim();
    if(!q) return;
    questions.push({question:q, answer:""});
    save();
    render();
    document.getElementById("questionInput").value = "";
}

// Admin login redirect
function loginAdmin() {
    const password = document.getElementById("adminPassword").value;
    if(password === "admin123"){ // change this to your password
        window.location.href = "admin.html";
    } else {
        alert("Wrong password!");
    }
}

// Render questions
function render() {
    const container = document.getElementById("questions");
    container.innerHTML = "";
    questions.forEach(q=>{
        container.innerHTML += `
            <div class="card">
                <b>Question:</b> ${q.question}<br>
                ${q.answer ? `<div class="answer"><b>Answer:</b> ${q.answer}</div>` : ""}
            </div>
        `;
    });
}

render();
</script>

</body>
</html>
