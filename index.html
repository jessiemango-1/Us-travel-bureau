<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ask Anything - Public Q&A</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#cde7ff,#ffd6f6,#ffe5cc);
  margin:0;
}
header {
  text-align:center;
  font-size:40px;
  padding:25px;
  font-weight:bold;
}
.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}
.card {
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
button {
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#9fd3ff;
  font-weight:bold;
  cursor:pointer;
}
button:hover {
  background:#7fc2ff;
}
.answer {
  margin-top:10px;
  background:#eef4ff;
  padding:10px;
  border-radius:10px;
}
</style>
</head>
<body>

<header>💬 Ask Anything</header>

<div class="container">

<!-- Ask Question -->
<div class="card">
<h2>Ask a Question</h2>
<input id="questionInput" placeholder="Type your question here">
<button onclick="askQuestion()">Submit</button>
</div>

<!-- Admin Login -->
<div class="card">
<h2>Admin Panel Login</h2>
<input id="adminPassword" type="password" placeholder="Admin password">
<button onclick="loginAdmin()">Login as Admin</button>
<p id="adminStatus"></p>
</div>

<!-- Questions Section -->
<div class="card">
<h2>Questions</h2>
<div id="questions"></div>
</div>

</div>

<script>
// ---- Data storage ----
let questions = JSON.parse(localStorage.getItem("questions")) || [];
let isAdmin = false;

// ---- Functions ----
function save() {
  localStorage.setItem("questions", JSON.stringify(questions));
}

function askQuestion() {
  let q = document.getElementById("questionInput").value.trim();
  if(!q) return;
  questions.push({question:q, answer:""});
  save();
  render();
  document.getElementById("questionInput").value = "";
}

function loginAdmin() {
  const password = document.getElementById("adminPassword").value;
  // Change this password to whatever you want
  if(password === "admin123") {
    isAdmin = true;
    document.getElementById("adminStatus").innerText = "Logged in as admin ✅";
    render();
  } else {
    alert("Wrong password!");
  }
}

function answerQuestion(i) {
  if(!isAdmin) return alert("Admin login required!");
  let a = prompt("Type your answer:");
  if(a) {
    questions[i].answer = a;
    save();
    render();
  }
}

function render() {
  const container = document.getElementById("questions");
  container.innerHTML = "";
  questions.forEach((q,i)=>{
    container.innerHTML += `
      <div class="card">
        <b>Question:</b> ${q.question}<br><br>
        ${isAdmin ? `<button onclick="answerQuestion(${i})">Answer</button>` : ""}
        ${q.answer ? `<div class="answer"><b>Answer:</b> ${q.answer}</div>` : ""}
      </div>
    `;
  });
}

// ---- Initial render ----
render();

</script>

</body>
</html>
